<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Products | Smart Grocery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/responsive.css">


</head>

<body>


<div id="navbar"></div>

<div class="container py-5">

    <h1 class="text-center mb-3">
        Grocery Product Comparison
    </h1>

    <p class="text-center text-muted mb-5">
        Compare grocery products based on price, rating, category and availability.
    </p>

    <div class="row g-3">

        <div class="col-md-6">

            <label class="form-label">
                Select Product 1
            </label>

            <select id="product1" class="form-select">

                <option value="">
                    Loading Products...
                </option>

            </select>

        </div>

        <div class="col-md-6">

            <label class="form-label">
                Select Product 2
            </label>

            <select id="product2" class="form-select">

                <option value="">
                    Loading Products...
                </option>

            </select>

        </div>

    </div>

    <div class="text-center mt-4">

        <button class="btn btn-success" onclick="compareItem()">

            Compare Product

        </button>

    </div>

    <div id="compareResult" class="mt-5" style="display:none;">

        <div class="card shadow">

            <div class="card-header bg-success text-white">

                Comparison Result

            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-bordered text-center align-middle">

                        <thead>

                            <tr>

                                <th>Details</th>

                                <th id="name1"></th>

                                <th id="name2"></th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr>

                                <td>Image</td>

                                <td>

                                    <img id="image1"
                                         class="img-fluid"
                                         width="150">

                                </td>

                                <td>

                                    <img id="image2"
                                         class="img-fluid"
                                         width="150">

                                </td>

                            </tr>

                            <tr>

                                <td>Price (RM)</td>

                                <td id="price1"></td>

                                <td id="price2"></td>

                            </tr>

                            <tr>

                                <td>Rating</td>

                                <td id="rating1"></td>

                                <td id="rating2"></td>

                            </tr>

                            <tr>

                                <td>Category</td>

                                <td id="category1"></td>

                                <td id="category2"></td>

                            </tr>

                            <tr>

                                <td>Availability</td>

                                <td id="stock1"></td>

                                <td id="stock2"></td>

                            </tr>

                            <tr>

                                <td>Description</td>

                                <td id="description1"></td>

                                <td id="description2"></td>

                            </tr>

                            <tr>
                                <td>Calories (kcal)</td>
                                <td id="calories1"></td>
                                <td id="calories2"></td>
                            </tr>

                            <tr>
                                <td>Protein (g)</td>
                                <td id="protein1"></td>
                                <td id="protein2"></td>
                            </tr>

                            <tr>
                                <td>Fat (g)</td>
                                <td id="fat1"></td>
                                <td id="fat2"></td>
                            </tr>

                            <tr>
                                <td>Carbohydrates (g)</td>
                                <td id="carbs1"></td>
                                <td id="carbs2"></td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<div id="footer"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/theme.js"></script>
<script src="js/nutrition.js"></script>
<script src="js/compare.js"></script>




</body>

</html>
