<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Products | Smart Grocery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/responsive.css">


</head>

<body>


<div id="navbar"></div>

<div class="container py-5">

    <h1 class="text-center mb-3">
        Grocery Product Comparison
    </h1>

    <p class="text-center text-muted mb-5">
        Compare grocery products based on price, rating, category and availability.
    </p>

    <div class="row g-3">

        <div class="col-md-6">

            <label class="form-label">
                Select Product 1
            </label>

            <select id="product1" class="form-select">

                <option value="">
                    Loading Products...
                </option>

            </select>

        </div>

        <div class="col-md-6">

            <label class="form-label">
                Select Product 2
            </label>

            <select id="product2" class="form-select">

                <option value="">
                    Loading Products...
                </option>

            </select>

        </div>

    </div>

    <div class="text-center mt-4">

        <button class="btn btn-success" onclick="compareItem()">

            Compare Product

        </button>

    </div>

    <div id="compareResult" class="mt-5" style="display:none;">

        <div class="card shadow">

            <div class="card-header bg-success text-white">

                Comparison Result

            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-bordered text-center align-middle">

                        <thead>

                            <tr>

                                <th>Details</th>

                                <th id="name1"></th>

                                <th id="name2"></th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr>

                                <td>Image</td>

                                <td>

                                    <img id="image1"
                                         class="img-fluid"
                                         width="150">

                                </td>

                                <td>

                                    <img id="image2"
                                         class="img-fluid"
                                         width="150">

                                </td>

                            </tr>

                            <tr>

                                <td>Price (RM)</td>

                                <td id="price1"></td>

                                <td id="price2"></td>

                            </tr>

                            <tr>

                                <td>Rating</td>

                                <td id="rating1"></td>

                                <td id="rating2"></td>

                            </tr>

                            <tr>

                                <td>Category</td>

                                <td id="category1"></td>

                                <td id="category2"></td>

                            </tr>

                            <tr>

                                <td>Availability</td>

                                <td id="stock1"></td>

                                <td id="stock2"></td>

                            </tr>

                            <tr>

                                <td>Description</td>

                                <td id="description1"></td>

                                <td id="description2"></td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<div id="footer"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/theme.js"></script>

<script>

    let groceryList = [];

    async function getProducts() {

        try {

            const response =
                await fetch(`${API_URL}/category/groceries`);

            const data =
                await response.json();

            groceryList =
                data.products;

            const product1 =
                document.getElementById("product1");

            const product2 =
                document.getElementById("product2");

            product1.innerHTML = "";
            product2.innerHTML = "";

            groceryList.forEach(item => {

                product1.innerHTML += `

                    <option value="${item.id}">
                        ${item.title}
                    </option>

                `;

                product2.innerHTML += `

                    <option value="${item.id}">
                        ${item.title}
                    </option>

                `;

            });

        }

        catch(error) {

            console.log(error);

        }

    }

    function compareItem() {

        let firstProduct =
            groceryList.find(
                item =>
                item.id ==
                document.getElementById("product1").value
            );

        let secondProduct =
            groceryList.find(
                item =>
                item.id ==
                document.getElementById("product2").value
            );

        if(!firstProduct || !secondProduct){

            alert("Please select two products.");
            return;

        }

        document.getElementById("compareResult").style.display =
            "block";

        document.getElementById("name1").innerText =
            firstProduct.title;

        document.getElementById("name2").innerText =
            secondProduct.title;

        document.getElementById("image1").src =
            firstProduct.thumbnail;

        document.getElementById("image2").src =
            secondProduct.thumbnail;

        document.getElementById("price1").innerText =
            "RM " + firstProduct.price;

        document.getElementById("price2").innerText =
            "RM " + secondProduct.price;

        document.getElementById("rating1").innerText =
            firstProduct.rating;

        document.getElementById("rating2").innerText =
            secondProduct.rating;

        document.getElementById("category1").innerText =
            firstProduct.category;

        document.getElementById("category2").innerText =
            secondProduct.category;

        document.getElementById("stock1").innerText =
            firstProduct.stock;

        document.getElementById("stock2").innerText =
            secondProduct.stock;

        document.getElementById("description1").innerText =
            firstProduct.description;

        document.getElementById("description2").innerText =
            secondProduct.description;

    }

    getProducts();

</script>


</body>

</html>
