<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Details | Smart Grocery</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <div id="navbar"></div>

    <section class="container mt-4">

        <a href="products.html" class="btn btn-outline-success">

            <i class="bi bi-arrow-left"></i>

            Back to Products

        </a>

    </section>

    <section class="py-5">

        <div class="container">

            <div class="row g-5">

                <!-- Image -->

                <div class="col-lg-5 text-center">

                    <img id="productImage" class="img-fluid rounded shadow" style="max-height:420px;">

                </div>

                <!-- Details -->

                <div class="col-lg-7">

                    <span id="productCategory" class="badge bg-success mb-3">

                        Groceries

                    </span>

                    <h1 id="productTitle">

                        Loading...

                    </h1>

                    <h2 class="text-success fw-bold">

                        RM <span id="productPrice"></span>

                    </h2>

                    <p>

                        ⭐ <span id="productRating"></span>/5

                    </p>

                    <p id="productDescription"></p>

                    <div class="d-flex gap-3 mt-4">

                        <button class="btn btn-success">

                            <i class="bi bi-columns-gap"></i>

                            Compare

                        </button>

                        <button class="btn btn-outline-success">

                            <i class="bi bi-file-earmark-plus"></i>

                            Add Summary

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <section class="py-5 bg-light">

        <div class="container">

            <h2 class="mb-4">

                Nutrition Facts

            </h2>

            <div class="card shadow">

                <div class="card-body">

                    <div class="row text-center">

                        <div class="col">

                            <h3 id="calories">

                                0

                            </h3>

                            Calories

                        </div>

                        <div class="col">

                            <h3 id="protein">

                                0g

                            </h3>

                            Protein

                        </div>

                        <div class="col">

                            <h3 id="fat">

                                0g

                            </h3>

                            Fat

                        </div>

                        <div class="col">

                            <h3 id="carbs">

                                0g

                            </h3>

                            Carbohydrates

                        </div>

                        <div class="col">

                            <h3 id="sugar">

                                0g

                            </h3>

                            Sugar

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <section class="py-5">

        <div class="container">

            <h2 class="mb-4">

                Product Information

            </h2>

            <table class="table table-bordered">

                <tr>

                    <th width="30%">

                        Brand

                    </th>

                    <td id="brand">

                        -

                    </td>

                </tr>

                <tr>

                    <th>

                        Category

                    </th>

                    <td id="category">

                        -

                    </td>

                </tr>

                <tr>

                    <th>

                        Stock

                    </th>

                    <td id="stock">

                        -

                    </td>

                </tr>

                <tr>

                    <th>

                        Weight

                    </th>

                    <td id="weight">

                        -

                    </td>

                </tr>

                <tr>

                    <th>

                        SKU

                    </th>

                    <td id="sku">

                        -

                    </td>

                </tr>

            </table>

        </div>

    </section>

    <section class="py-5 bg-light">

        <div class="container">

            <div class="card shadow">

                <div class="card-body">

                    <h2>

                        Health Rating

                    </h2>

                    <div class="progress mt-4 mb-3">

                        <div id="healthBar" class="progress-bar bg-success" style="width:85%;">

                            85%

                        </div>

                    </div>

                    <ul>

                        <li>

                            Low Sugar

                        </li>

                        <li>

                            Rich in Nutrients

                        </li>

                        <li>

                            Suitable for Daily Consumption

                        </li>

                    </ul>

                </div>

            </div>

        </div>

    </section>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/product_details.js"></script>
    <script src="js/theme.js"></script>

</body>

</html>
