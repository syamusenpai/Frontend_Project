<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Summary Report</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="css/style.css">

<link rel="stylesheet"
      href="css/theme.css">

<link rel="stylesheet"
      href="css/responsive.css">
```

</head>

<body>

<div id="navbar"></div>

<div class="container py-5">

```
<h1 class="text-center mb-3">

    Grocery Summary Report

</h1>

<p class="text-center text-muted mb-5">

    View grocery product information and generate a printable report.

</p>

<div class="row justify-content-center">

    <div class="col-md-6">

        <label class="form-label">

            Select Product

        </label>

        <select id="productSelect"
                class="form-select">

            <option value="">

                Loading Products...

            </option>

        </select>

    </div>

</div>

<div class="text-center mt-4">

    <button class="btn btn-success"
            onclick="showSummary()">

        Generate Summary

    </button>

    <button class="btn btn-primary ms-2"
            onclick="window.print()">

        Print Report

    </button>

</div>

<div id="summaryCard"
     class="mt-5"
     style="display:none;">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            Product Summary

        </div>

        <div class="card-body">

            <div class="text-center mb-4">

                <img id="productImage"
                     class="img-fluid rounded"
                     width="220">

            </div>

            <h3 id="productName"
                class="text-center"></h3>

            <hr>

            <p>

                <strong>Price :</strong>

                RM <span id="productPrice"></span>

            </p>

            <p>

                <strong>Rating :</strong>

                <span id="productRating"></span>

            </p>

            <p>

                <strong>Category :</strong>

                <span id="productCategory"></span>

            </p>

            <p>

                <strong>Availability :</strong>

                <span id="productStock"></span>

            </p>

            <p>

                <strong>Description :</strong>

                <span id="productDescription"></span>

            </p>

            <hr>

            <h5>

                Recommendation

            </h5>

            <p id="recommendation"></p>

        </div>

    </div>

</div>
```

</div>

<div id="footer"></div>

<script src="js/api.js"></script>

<script src="js/app.js"></script>

<script src="js/theme.js"></script>

<script>

let groceryList = [];

async function loadProducts() {

    try {

        const response =
            await fetch(`${API_URL}/category/groceries`);

        const data =
            await response.json();

        groceryList =
            data.products;

        const productSelect =
            document.getElementById("productSelect");

        productSelect.innerHTML =
            `<option value="">Choose a Product</option>`;

        groceryList.forEach(product => {

            productSelect.innerHTML += `

                <option value="${product.id}">
                    ${product.title}
                </option>

            `;

        });

    }

    catch(error){

        console.log(error);

    }

}

function showSummary() {

    let selectedProduct =
        groceryList.find(

            item =>

            item.id ==

            document.getElementById("productSelect").value

        );

    if(!selectedProduct){

        alert("Please select a product.");

        return;

    }

    document.getElementById("summaryCard").style.display =
        "block";

    document.getElementById("productImage").src =
        selectedProduct.thumbnail;

    document.getElementById("productName").innerText =
        selectedProduct.title;

    document.getElementById("productPrice").innerText =
        selectedProduct.price;

    document.getElementById("productRating").innerText =
        selectedProduct.rating;

    document.getElementById("productCategory").innerText =
        selectedProduct.category;

    document.getElementById("productStock").innerText =
        selectedProduct.stock;

    document.getElementById("productDescription").innerText =
        selectedProduct.description;

    let recommendation = "";

if(selectedProduct.rating >= 4.7 && selectedProduct.stock > 50){

    recommendation =
    "Excellent choice. Highly rated and widely available.";

}

else if(selectedProduct.rating >= 4.7){

    recommendation =
    "Highly recommended based on strong customer ratings.";

}

else if(selectedProduct.price < 10){

    recommendation =
    "Budget-friendly product with affordable pricing.";

}

else if(selectedProduct.stock < 20){

    recommendation =
    "Limited stock available. Purchase soon if needed.";

}

else{

    recommendation =
    "Compare this product with similar items before purchasing.";

}

document.getElementById("recommendation").innerText =
    recommendation;

}

loadProducts();

</script>

</body>

</html>
